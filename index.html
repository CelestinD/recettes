<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Recettes familiales des De Serres-Lafontaine">
  <title>Recettes De Serres-Lafontaine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Recettes familiales</h1>
      <p class="subtitle">De Serres-Lafontaine</p>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8.5" cy="8.5" r="5.5"/>
          <line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
        <input
          type="search"
          id="search"
          placeholder="Rechercher une recette…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
      </div>
      <div class="filters" id="filters" role="group" aria-label="Filtrer par catégorie">
        <button class="filter-btn active" data-cat="all">Toutes</button>
      </div>
      <div class="toolbar-meta">
        <span class="results-count" id="results-count"></span>
        <select id="sort" class="sort-select" aria-label="Trier les recettes">
          <option value="default">Ordre par défaut</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </div>
    </div>

    <div class="recipe-grid" id="recipe-grid" role="list"></div>

    <p class="empty-state" id="empty-state" hidden>Aucune recette trouvée.</p>
  </main>

  <!-- Modal recette -->
  <div class="modal-overlay" id="modal-overlay" hidden aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <p class="modal-cat" id="modal-cat"></p>
          <h2 class="modal-title" id="modal-title"></h2>
        </div>
        <div class="modal-actions">
          <button class="modal-icon-btn" id="modal-fav" aria-label="Ajouter aux favoris">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 17s-7-4.5-7-9a4 4 0 0 1 7-2.65A4 4 0 0 1 17 8c0 4.5-7 9-7 9z"/>
            </svg>
          </button>
          <button class="modal-icon-btn" id="modal-share" aria-label="Partager la recette">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="15" cy="5" r="2"/><circle cx="5" cy="10" r="2"/><circle cx="15" cy="15" r="2"/>
              <line x1="7" y1="9" x2="13" y2="6"/><line x1="7" y1="11" x2="13" y2="14"/>
            </svg>
          </button>
          <button class="modal-close" id="modal-close" aria-label="Fermer">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="4" y1="4" x2="16" y2="16"/>
              <line x1="16" y1="4" x2="4" y2="16"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="modal-body" id="modal-body">

        <div class="portions-bar">
          <span class="portions-label">Portions</span>
          <div class="portions-control">
            <button class="portions-btn" id="portions-minus" aria-label="Diminuer les portions">−</button>
            <span class="portions-count" id="portions-count"></span>
            <button class="portions-btn" id="portions-plus" aria-label="Augmenter les portions">+</button>
          </div>
        </div>

        <div id="modal-note" class="recipe-note" hidden></div>

        <div class="modal-meta" id="modal-meta"></div>

        <section class="recipe-section">
          <h3>Ingrédients</h3>
          <ul class="ingredient-list" id="ingredient-list"></ul>
        </section>

        <section class="recipe-section">
          <h3>Préparation</h3>
          <ol class="step-list" id="step-list"></ol>
        </section>

      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
